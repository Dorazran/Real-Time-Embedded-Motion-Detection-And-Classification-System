# motion.conf - Embedded Motion Detection System configuration
# Target: ARM Cortex-A15 (QEMU vexpress-a15)
#
# All paths are from the perspective of the running ARM system.

# Directory containing *.pgm frame files (sorted alphabetically)
FRAMES_DIR=/root/frames

# Region of Interest (pixels, from top-left of each image)
# Set to full image size (16x16) for the bundled test_frames
ROI_X=0
ROI_Y=0
ROI_WIDTH=16
ROI_HEIGHT=16

# Minimum absolute pixel difference to count a pixel as "changed"
# Range: 0-255  (20 works well for 8-bit PGM with noise margin)
PIXEL_THRESHOLD=20

# UART device for real-time alerts (PL011 on vexpress-a15)
UART_DEVICE=/dev/ttyAMA0

# TCP alert server  (10.0.2.2 = QEMU user-mode host gateway)
TCP_HOST=10.0.2.2
TCP_PORT=5000

# Log file path (writable tmpfs inside initramfs)
LOG_FILE=/tmp/motion_log.txt

# 1 = use simulated FPGA pipeline  |  0 = pure software diff
USE_FPGA_SIM=1
